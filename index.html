<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Joice Leite — Advocacia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #FAFAF8;
            color: #1A1F2E;
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }
        .card {
            max-width: 520px;
            width: 100%;
            text-align: center;
            padding: 3rem 2rem;
        }
        .mark {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6B7280;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 500;
            color: #0B1120;
            margin-bottom: 2.5rem;
            letter-spacing: 0.02em;
        }
        .divider {
            width: 48px;
            height: 1px;
            background: #C4956A;
            margin: 0 auto 2.5rem;
        }
        p {
            font-size: 1rem;
            color: #4B5563;
            margin-bottom: 1rem;
        }
        .contact {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #4B5563;
        }
        .contact a {
            color: #0B1120;
            text-decoration: none;
            border-bottom: 1px solid #C4956A;
        }
        .contact a:hover { color: #C4956A; }
        .location {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #9CA3AF;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="mark">Joice Leite</p>
        <h1>Advocacia</h1>
        <div class="divider"></div>
        <p>Site em manutenção temporária.</p>
        <p>Estamos atualizando as informações deste endereço.</p>
        <p class="contact">
            Para contato, envie e-mail para<br>
            <a href="mailto:contato@joiceleite.com.br">contato@joiceleite.com.br</a>
        </p>
        <p class="location">São José dos Campos — SP</p>
    </main>
</body>
</html>
